INI:Missions:RA2_HD:Description=-- Red Alert 2 Seferi --
INI:Missions:RA2_INTRO:Description=Giriş
INI:Missions:RA2_INTRO:LongDescription=1946'da Albert Einstein, zamanda geriye gidip tarihi sonsuza dek değiştirmek için Kronosfer cihazını kullandı.@Ancak Einstein'ın iyi niyetleri, dünya güçlerinin hassas dengesini bozdu ve Joseph Stalin'in komünist Rusya'sının Avrupa'ya büyük bir işgal başlatmasına olanak tanıdı.@Başlangıçta Sovyet işgali başarılıydı ve kısa sürede İngilizlerin Avrupa'daki son özgür halk olacağı göründü.@Ancak Avrupalı müttefikler toparlandı ve sonunda komünist savaş makinesini parçaladı.@Stalin'in yenilgisiyle, Alexander Romanov adındaki bu adam, Müttefik komutanların onayıyla iktidara geldi.@Bir aristokrat ve Komünist Parti üyesi olmasına rağmen, Romanov barış yanlısıydı.@Mevcut uydu istihbaratı, Romanov'un iyi niyetli davranmıyor olabileceğini gösteriyor.@Sovyet savaş gemileri Atlantik'e doğru yüksek hızla ilerlerken görüldü.@Sadece "Yuri" olarak bilinen bu adam, Sovyetler Birliği'ndeki tüm gizli istihbarat ağımızın kapatılmasından sorumlu olabilir.@Yuri, Romanov'un baş danışmanı olduğundan beri Sovyetler Birliği ile ilişkiler bozuldu, ülkedeki ajanlarımız kayıp, bazıları KGB ajanlarıyla işbirliği yaparken görüldü.@En kötüsüne hazırlanmalıyız Komutan - Sovyetlerle savaşa.
INI:Missions:RA2_SOV01:Description=Sovyet Görevi 1 - Kızıl Şafak
INI:Missions:RA2_SOV01:LongDescription=Sovyet Görevi 1 - Kızıl Şafak@Konum: Washington DC@@Amerika Birleşik Devletleri'ne yapılan Sovyet saldırısının öncüsü olmak senin şansın. Birliklerini Washington boyunca yönet ve Amerikan askeri gücünün en nefret edilen sembolü olan Pentagon'u yok et.@@ Hedef 1: Pentagon'u yok et.
INI:Missions:RA2_SOV02:Description=Sovyet Görevi 2 - Düşman Kıyı
INI:Missions:RA2_SOV02:LongDescription=Sovyet Görevi 2 - Düşman Kıyı@Konum: Florida Kıyısı@@Amerikalılar aptalca bir şekilde Florida'nın doğu kıyısındaki küçük bir limanda filo topladılar. Dreadnought'undaki General Vladimir'in yardımıyla, düşman kıyısına zorla çıkarma yapacak ve bir üs kuracaksınız. Hazır olduğunuzda, kapitalist domuzlara saldırın ve onları Sovyet adaletinin demir topuğu altında ezin.@@ Hedef 1: Zorla çıkarma yap ve bir üs kur.@ Hedef 2: Tüm düşman güçlerini yok et.
INI:Missions:RA2_SOV03:Description=Sovyet Görevi 3 - Büyük Elma
INI:Missions:RA2_SOV03:LongDescription=Sovyet Görevi 3 - Büyük Elma@Konum: New York Şehri@@Psişik işaret kulemizi tamamlamak için bazı Amerikan teknolojilerini ele geçirmemiz gerekecek. Güçlerini New York'a götür ve Savaş Laboratuvarlarını ele geçir. Ardından şehrin kontrolünü ele geçirmek için bir Psişik İşaret Kulesi inşa et. @@ Hedef 1: Amerikan Savaş Laboratuvarı'nı ele geçir.@ Hedef 2: Bir Psişik İşaret Kulesi (Psychic Beacon) inşa et ve savun.
INI:Missions:RA2_SOV04:Description=Sovyet Görevi 4 - İç Cephe
INI:Missions:RA2_SOV04:LongDescription=Sovyet Görevi 4 - İç Cephe@Konum: Vladivostok@@Aptal Koreliler, başarısız Müttefiklerin tarafını tutmaya karar verdiler. Doğu topraklarımızı işgal etme yönündeki korkakça girişimleri kesinlikle başarısız olacak. Anavatanı savunun ve hazır olduğunuzda Korelileri okyanusa geri dökün. @@ Hedef 1: Bir üs kur. Anavatanı savun.@ Hedef 2: Tüm düşman güçlerini yok et.
INI:Missions:RA2_SOV05:Description=Sovyet Görevi 5 - Işıklar Şehri
INI:Missions:RA2_SOV05:LongDescription=Sovyet Görevi 5 - Işıklar Şehri@Konum: Paris, Fransa@@Avrupa ulusları, sakat kalmış Amerikalılarla birleşmeyi planlıyor. Bu saldırganlık eyleminin cezasız kalmasına izin vermemeliyiz. Güzel Parislerini yerle bir edeceksiniz. Kendi değerli anıtlarını kitle imha silahlarına dönüştürerek Müttefiklere gücün gerçek anlamını göstereceğiz. @@ Hedef 1: PARIS KULESİ'ni 3 TESLA PİYADESİ ile şarj et.@ Hedef 2: PARIS KULESİ'ni Müttefik saldırılarından koru.@ Hedef 3: Kalan tüm Müttefik birliklerini yen.
INI:Missions:RA2_SOV06:Description=Sovyet Görevi 6 - Böl ve Yönet
INI:Missions:RA2_SOV06:LongDescription=Sovyet Görevi 6 - Böl ve Yönet@Konum: Pearl Harbor, Hawaii@@Amerikalılar dizlerinin üzerinde, merhamet dileniyorlar. Pearl Harbor'daki filolarının son kalıntıları, amansız saldırın için çaresizce bekliyor. Ancak, Korelilerin henüz yenilmediğine ve Amerikan Donanması ile birleşmeye çalışabileceklerine dair haberler aldık. Başarılı olmamalılar.@@ Hedef 1: Hawaii Adalarında bir üs kur.@ Hedef 2: Müttefik Donanmasını yok et.
INI:Missions:RA2_SOV07:Description=Sovyet Görevi 7 - Krono Savunması
INI:Missions:RA2_SOV07:LongDescription=Sovyet Görevi 7 - Krono Savunması@Konum: Ural Dağları, Rusya@@Amerikalılar Kronosferlerini devreye soktular: askerleri büyük mesafeler arasında neredeyse anında taşımalarını sağlayan bir cihaz. Artık istedikleri her yere saldırabilirler. Ural dağlarındaki Savaş Laboratuvarımızı savunmalısın. Amerikalılar, nihai savaş tankını geliştirmemizi durdurmak için kesinlikle umutsuz ama kaçınılmaz bir girişimle oraya saldıracaklar.@@ Hedef 1: Savaş Laboratuvarını ne pahasına olursa olsun savun.
INI:Missions:RA2_SOV08:Description=Sovyet Görevi 8 - Kutsalına Hakaret
INI:Missions:RA2_SOV08:LongDescription=Sovyet Görevi 8 - Kutsalına Hakaret@Konum: Washington DC@@En büyük zaferimizin saatinde bile, General Vladimir bize karşı döndü. Yumuşak Amerikan yaşam tarzı tarafından ayartılarak hain oldu ve birçok sadık komünisti bize karşı dönmeye ikna etti. Washington DC'ye gitmeli ve Vladimir'i o sefil deliğinden çıkarmalısın.@@ Hedef 1: Beyaz Saray'ı ele geçir.
INI:Missions:RA2_SOV09:Description=Sovyet Görevi 9 - Tilki ve Tazı
INI:Missions:RA2_SOV09:LongDescription=Sovyet Görevi 9 - Tilki ve Tazı@Konum: San Antonio, Teksas@@Zaferimiz yakın. Başkan bizi başarılı bir şekilde atlattı, ancak izini San Antonio, Teksas'taki 'The Alamo' adında kirli küçük bir kaleye kadar sürdük. Psi-Corp Birliklerimizi kullanarak Başkanı zihin kontrolüne almalı ve Amerika Birleşik Devletleri'ni teslim etmeye zorlamalısınız.@@ Hedef 1: Başkanı ele geçirmek için Zihin Kontrolü kullan.
INI:Missions:RA2_SOV10:Description=Sovyet Görevi 10 - Yıpranmış İttifak
INI:Missions:RA2_SOV10:LongDescription=Sovyet Görevi 10 - Yıpranmış İttifak@Konum: ABD Virgin Adaları@@Son umutsuz saatlerinde, Müttefikler son bir süper teknoloji parçası üretmeyi başardılar. Filoları batırabilen ve şehirleri dümdüz edebilen korkunç fırtınalar yaratmak için kullanabilecekleri bir Hava Kontrol Cihazına sahipler. Kıyamet silahlarını izole edilmiş ABD Virgin Adaları'nda sakladıklarına inanıyoruz.@@ Hedef 1: Hava Kontrol Cihazının yerini belirlemek için Amerikan Savaş Laboratuvarı'nı ele geçir.@ Hedef 2: Hava Kontrol Cihazını yok et.
INI:Missions:RA2_SOV11:Description=Sovyet Görevi 11 - Kızıl Devrim
INI:Missions:RA2_SOV11:LongDescription=Sovyet Görevi 11 - Kızıl Devrim@Konum: Moskova@@Yuri bize karşı döndü. Böyle bir ihanetin tek bir cevabı olabilir.@@ Hedef 1: Yuri'nin karargahını - Kremlin'i yok et.
INI:Missions:RA2_SOV12:Description=Sovyet Görevi 12 - Kutup Fırtınası
INI:Missions:RA2_SOV12:LongDescription=Sovyet Görevi 12 - Kutup Fırtınası@Konum: Point Hope, Alaska@@Son zayıf Müttefik kalesini bulduk. Artık tamamen çalışır durumda olan Kronosferleri, askerleri dünyanın herhangi bir yerine taşıyabilir. Bize New York'ta, Prag'da, hatta Moskova'da saldırabilirler. Yuri'nin dosyaları cihazın Point Hope, Alaska yakınlarında olduğunu gösteriyor. Bölgedeki az sayıdaki kuvvetimizi almalı ve Müttefikler korkakça teknolojilerini kullanmadan önce bir saldırı yönetmelisin. Bu son saat komutan. Zafer seni bekliyor.@@ Hedef 1: Kronosfer'i yok et.
INI:Missions:RA2_SOVHD:Description=-- Sovyet Seferi - Yıkım Yürüyüşü --
INI:Missions:RA2_TUT01:Description=Acemi Birliği - 1. Gün
INI:Missions:RA2_TUT01:LongDescription=Acemi Birliği - 1. Gün@Konum: Çok Gizli@@Bu temel eğitimdir. Çavuşunu dinle ve ne diyorsa onu yap.
INI:Missions:RA2_TUT02:Description=Acemi Birliği - 2. Gün
INI:Missions:RA2_TUT02:LongDescription=Acemi Birliği - 2. Gün@Konum: Çok Gizli@@Bu temel eğitiminizin son günü. Zaman kısıtlı ve Sovyetler yakında saldırabilir. Çavuşunu dinle, öğrenebildiğini öğren ve savaşa hazırlan.
INI:Missions:RA2_TUTHD:Description=-- Acemi Birliği --
INI:Missions:YR_ALL01:Description=Müttefik Görevi 1 - Zaman Aşımı
INI:Missions:YR_ALL01:LongDescription=Müttefik Görevi 1 - Operasyon: Zaman Aşımı@Konum: San Francisco, California@@Yuri'nin Alcatraz'daki Psişik Dominator'ı tekrar çevrimiçi hale getirmesi an meselesi. Tek şansımız, Yuri dünya çapındaki Psişik Dominator ağını tamamlamadan önce Profesör Einstein'ın Zaman Makinesini kullanarak geçmişe gitmek ve onu durdurmak.@@ Hedef 1: Zaman Makinesine güç sağlamak için Güç Santrallerini ele geçir.@ Hedef 2: Zaman Makinesini savun.@ Hedef 3: Alcatraz'daki Psişik Dominator'ı yok et.
INI:Missions:YR_ALL02:Description=Müttefik Görevi 2 - Hollywood ve Kibir
INI:Missions:YR_ALL02:LongDescription=Müttefik Görevi 2 - Operasyon: Hollywood ve Kibir@Konum: Los Angeles, California@@Yuri, Los Angeles nüfusunu zihin kontrolüne aldı ve Psişik Dominator projesini finanse etmek için sivilleri Öğütücülerine (Grinders) atıyor. Eğer Öğütücüleri ortadan kaldırabilirsek, Yuri önemli bir fon kaynağını kaybetmiş olacak.@@ Hedef 1: Şehirdeki tüm Öğütücüleri yok et.@ Hedef 2: Tüm Yuri binalarını yok et.
INI:Missions:YR_ALL03:Description=Müttefik Görevi 3 - Güç Oyunu
INI:Missions:YR_ALL03:LongDescription=Müttefik Görevi 3 - Operasyon: Güç Oyunu@Konum: Seattle, Washington@@Yuri'nin birincil fon kaynağını yok ettiğimize göre, deli adam daha doğrudan bir yaklaşım benimsemeye karar verdi. Yuri, Seattle'da bir Nükleer Silo kurdu ve bunu MassiveSoft şirketinden para ve teknik uzmanlık sızdırmak için kullanıyor. Şehri ve MassiveSoft'u Yuri'nin nükleer tehdidinden kurtarmalıyız.@@ Hedef 1: Yuri'nin Nükleer Silosunu yok et.@ Hedef 2: MassiveSoft kampüsünü kurtar.
INI:Missions:YR_ALL04:Description=Müttefik Görevi 4 - Yağmalanan Mezar
INI:Missions:YR_ALL04:LongDescription=Müttefik Görevi 4 - Operasyon: Yağmalanan Mezar@Konum: Mısır@@Yuri, Psişik Dominator Teknolojisinin tamamlanmasını hızlandırmak amacıyla Einstein'ı ele geçirdi. Einstein'ı derhal kurtarmamız ve ardından Mısır'ı tüm Yuri güçlerinden temizlememiz şart.@@ Hedef 1: Einstein'ı kurtarmak için Büyük Piramit yakınındaki Biyo Reaktörleri yok et.@ Hedef 2: Yuri'nin üssünü yok et.
INI:Missions:YR_ALL05:Description=Müttefik Görevi 5 - Aşağıdaki Klonlar
INI:Missions:YR_ALL05:LongDescription=Müttefik Görevi 5 - Operasyon: Aşağıdaki Klonlar@Konum: Sidney, Avustralya@@Yuri, Sidney, Avustralya'da klonlama tesisleri kurdu. Dünya liderlerini klonlamayı planladığına inanılıyor. Ne pahasına olursa olsun bu operasyona bir son vermeliyiz.@@ Hedef 1: Yuri'nin Klonlama Tanklarını bul ve yok et.@ Hedef 2: Yuri'nin kalan güçlerini yok et.
INI:Missions:YR_ALL06:Description=Müttefik Görevi 6 - Hile veya Anlaşma
INI:Missions:YR_ALL06:LongDescription=Müttefik Görevi 6 - Operasyon: Hile veya Anlaşma@Konum: Londra, İngiltere@@Dünya liderlerini klonlamayı başaramayan Yuri, gerçeklerini ele geçirmeyi planlıyor. Onları Londra, İngiltere'deki Parlamento Binası'nda savun... sonra Yuri'nin icabına bak.@@ Hedef 1: Parlamentoyu saldırıdan koru.@ Hedef 2: Yuri'nin üssünü yok et.
INI:Missions:YR_ALL07:Description=Müttefik Görevi 7 - Beyin Ölümü
INI:Missions:YR_ALL07:LongDescription=Müttefik Görevi 7 - Operasyon: Beyin Ölümü@Konum: Antarktika@@Neredeyse bitti, Komutan. Yuri'nin planı harabeye döndü. Ancak, Antarktika'daki kalesinde bir yerlerde hala son bir Psişik Dominator'ı var. Tierra del Fuego'daki terk edilmiş Sovyet Üssünü tekrar çevrimiçi hale getir ve Yuri'nin tam yerini belirleyebilmemiz için bir radar çanağı inşa et. Ardından, Müttefik ve Sovyet güçlerinin birleşik gücüyle, Yuri'nin planlarına sonsuza dek bir son ver.@@ Hedef 1: Bir Sovyet Radar Kulesi inşa et.@ Hedef 2: Antarktika'daki Psişik Dominator'ı yok et.@ Hedef 3: Tüm Yuri güçlerini yok et.
INI:Missions:YR_ALLHD:Description=-- Müttefik Seferi --
INI:Missions:YR_HD:Description=-- Yuri's Revenge Seferi --
INI:Missions:YR_INTRO:Description=Giriş
INI:Missions:YR_INTRO:LongDescription=Müttefikler zaferlerini kutlarken, Yuri kendini ifşa eder. Kendi zihni değiştirilmiş savaşçılar ve genetik mutasyonlar ordusunu yaratmıştır.@Zamanını bir dizi yeni teknoloji yaratarak geçirmiştir; bunlardan en sinsisi, kurbanlarının tam kontrolünü sağlayan bir cihaz olan@Psişik Dominator'dır. Yuri, küresel çapta birçok Psişik Dominator yerleştirmiş,@etkinleştirildiklerinde dünya nüfusunun zihinlerini kontrol etmekle tehdit etmektedir.@@Müttefikler, Yuri'nin Alcatraz Adası'ndaki tesisine derhal bir saldırı başlatır. Saldırı Psişik Dominator'ı yok etmede başarısız olsa da,@Yuri'nin gücünü cihazın etkinleşmesini engelleyecek kadar düşürmede başarılı olur.@Artık Müttefiklerin tek umudu, Profesör Einstein tarafından yaratılan bir zaman makinesini etkinleştirmek için yeterli gücü toplamaktır.@Bununla, Yuri'nin cihazını etkinleşmeden çok önce ortadan kaldırmak için geçmişe bir kuvvet gönderebilirler.@Ne yazık ki, Sovyetlerin zaman makinesini çalmak ve sadece Yuri'yi durdurmakla kalmayıp@aynı zamanda son savaşın sonucunu da tersine çevirmek için kendi planları vardır!
INI:Missions:YR_SOV01:Description=Sovyet Görevi 1 - Zaman Kayması
INI:Missions:YR_SOV01:LongDescription=Sovyet Görevi 1 - Operasyon: Zaman Kayması@Konum: San Francisco, California@@Dünya harabe halinde. Yuri rakipsiz hüküm sürmeye hazır. Yuri ile tam hakimiyet arasında sadece zamanda geriye gitmek için yapılan cüretkar bir Müttefik planı duruyor. Ancak Yuri ihanetinin bedelini Müttefiklerin değil, Sovyetlerin elinden ödemeli. Zaman Makinesini ele geçirmeli ve bizzat biz geri gitmeliyiz.@@ Hedef 1: Müttefik donanmasını ve Büyük Topları yok et.@ Hedef 2: Zaman Makinesini ele geçirmek için etrafındaki Makineli Tüfek Yuvalarını yok et.@ Hedef 3: Zaman Makinesine güç sağlamak için 4 Güç Santralini ele geçir.@ Hedef 4: Sovyet üssünün kontrolünü al ve Psişik Dominator'ı yok et.
INI:Missions:YR_SOV02:Description=Sovyet Görevi 2 - Deja Vu
INI:Missions:YR_SOV02:LongDescription=Sovyet Görevi 2 - Operasyon: Deja Vu@Konum: Kara Orman, Almanya@@Kara Orman'daki savaşı ilk seferinde kaybettik ve sonunda Einstein'ın Kronosfer'inin yardımıyla Müttefikler tarafından yenilgiye uğratıldık. Bu sefer başarısız olmamalıyız. Müttefiklere karşı savaşımızda Sovyet zaferini garantilemek için Einstein'ın Laboratuvarını ve Kronosfer'i yok et.@@ Hedef 1: Alman sınırını koruyan karakolları yok et.@ Hedef 2: Einstein'ın Laboratuvarını ve Kronosfer'i yok et.
INI:Missions:YR_SOV03:Description=Sovyet Görevi 3 - Beyin Yıkama
INI:Missions:YR_SOV03:LongDescription=Sovyet Görevi 3 - Operasyon: Beyin Yıkama@Konum: Londra, İngiltere@@Müttefikler Londra, İngiltere'de bir Psişik Dominator keşfettiler. Yuri, neredeyse tamamlanmış Dominator'ını savunmaya yardımcı olması için Müttefik saldırı gücünün kontrolünü ele geçirdi. Müttefikleri serbest bırak ve Yuri'yi yenmek için onlarla güçlerini birleştir... ama dikkatli ol, Dominator her an faaliyete geçebilir.@@ Hedef 1: Psişik İşaret Kulesi'ni yok et.@ Hedef 2: Psişik Dominator'ı yok et.@ Hedef 3: Yuri'nin güçlerinin işini bitir.
INI:Missions:YR_SOV04:Description=Sovyet Görevi 4 - Kaçak Romanov
INI:Missions:YR_SOV04:LongDescription=Sovyet Görevi 4 - Operasyon: Kaçak Romanov@Konum: Fas@@Başbakan Romanov, Yuri'nin güçleri tarafından vurularak düşürüldü. Başbakan'ın yerini bulmalı ve kurtarılabilmesi için onu havaalanına götürmeliyiz. Yuri, havaalanının etrafına, Başbakan'ın kurtarılması güvenli olmadan önce ortadan kaldırmamız gereken zorlu bir savunma inşa etti.@@ Hedef 1: Başbakan Romanov'u bul ve onu koru.@ Hedef 2: Havaalanını koruyan Yuri'nin üssünü yok et.@ Hedef 3: Güvenli olduğunda Romanov'u havaalanına götür.
INI:Missions:YR_SOV05:Description=Sovyet Görevi 5 - Kaçış Hızı
INI:Missions:YR_SOV05:LongDescription=Sovyet Görevi 5 - Operasyon: Kaçış Hızı@Konum: Pasifik Okyanusu'nda keşfedilmemiş bir ada@@Yuri'nin Pasifik Okyanusu'ndaki keşfedilmemiş bir adada bulunan gizli Denizaltı Üssünü ortaya çıkardık. Yuri'nin Boomer Denizaltılarının tehdidi etkisiz hale getirilmeli!@@ Hedef 1: Bir iniş bölgesi seç ve bir üs inşa et.@ Hedef 2: Yuri'nin Denizaltı Barınağını bul ve yok et.@ Hedef 3: Kalan tüm Yuri güçlerinin işini bitir.
INI:Missions:YR_SOV06:Description=Sovyet Görevi 6 - Ay'a Doğru
INI:Missions:YR_SOV06:LongDescription=Sovyet Görevi 6 - Operasyon: Ay'a Doğru@Konum: Ay@@Yuri, dünya üzerinde Psişik Dominator dalgasını başlattıktan sonra kendisini aya fırlatmayı planlıyor. Ay'da bir üs kurmalıyız, böylece Yuri'nin ay üslerini ve Ay Komuta Merkezini yok edebilecek bir saldırı gücü oluşturabiliriz.@@ Hedef 1: Üs kurmak için bir yer bul.@ Hedef 2: Yuri'nin Ay Komuta Merkezini bul ve yok et.@ Hedef 3: Yuri'nin kalan üssünü yok et.
INI:Missions:YR_SOV07:Description=Sovyet Görevi 7 - Akıl Oyunları
INI:Missions:YR_SOV07:LongDescription=Sovyet Görevi 7 - Operasyon: Akıl Oyunları@Konum: Transilvanya@@Saldırınızdan saklanmayı uman Yuri, Transilvanya'daki atalarının evine çekildi. Ona nefes aldırmamalıyız, yoksa sadece güçlerini toplayıp tekrar hepimizi tehdit etmek için geri dönecektir. Yuri'yi şimdi ve sonsuza dek ortadan kaldırın!@@ Hedef 1: Yuri'nin Kalesini yok et.
