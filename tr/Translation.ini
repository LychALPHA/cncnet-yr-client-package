INI:Missions:RA2_ALL01:Description=Müttefik Görevi 1 - Yalnız Muhafız
INI:Missions:RA2_ALL01:LongDescription=Müttefik Görevi 1 - Yalnız Muhafız@Konum: New York@@Sovyetler işgal etti. Sayıca bizden ona bir üstünler. New York'taki özel ajan Tanya'ya yardım etmelisin. Kuvvetlerimizi elimizden geldiğince hızlı bir şekilde topluyoruz Komutan, ancak zamana ihtiyacımız var. Küçük bir Amerikan üssü olan Fort Bradley, New York bölgesinde bulunuyor. Eğer temas kurabilirseniz, New York'un savunmasına yardımcı olabilirler. Tanya kaotik bir savaş alanında ilerleyecek. Fırsat hedeflerine dikkat edin ve yeni görev hedeflerini takip edin.@@ Hedef 1: Sovyet Dreadnought filosunu yok et.@ Hedef 2: Fort Bradley ile temas kur.@ Hedef 3: Tanya'yı hayatta tut.
INI:Missions:RA2_ALL02:Description=Müttefik Görevi 2 - Kartal Şafağı
INI:Missions:RA2_ALL02:LongDescription=Müttefik Görevi 2 - Kartal Şafağı@Konum: Hava Kuvvetleri Akademisi, Colorado@@Sovyet birlikleri Amerika'yı iğrenç bir veba gibi sardı. Hatta Colorado'daki Hava Kuvvetleri Akademisi'ni ele geçirmek için iç bölgelerimize kadar sızdılar. Akademi, öğrencileri ve içerdiği eşsiz teknoloji savunmamız için hayati önem taşıyor. Bölgedeki herhangi bir Amerikan birliğiyle temas kurmak, Hava Kuvvetleri Akademimizi geri almak ve Sovyetleri bölgeden sürmek için Tanya'yı kullanın.@@ Hedef 1: Sovyet işgali altındaki Hava Kuvvetleri Akademisi Şapeli'ni ele geçir.@ Hedef 2: Tüm Sovyet güçlerini yok et.@ Hedef 3: Tanya'yı hayatta tut.
INI:Missions:RA2_ALL03:Description=Müttefik Görevi 3 - Başkana Selam
INI:Missions:RA2_ALL03:LongDescription=Müttefik Görevi 3 - Başkana Selam@Konum: Washington DC@@Sovyetler Washington DC'yi işgal etti ve liderlerimizi zihin kontrolüne almak için şeytani psişik teknolojilerini kullandı. Beyaz Saray yakınındaki Psişik İşaret Kulesi'ni yok ederek onları kurtarmalısın. @@ Hedef 1: Psişik İşaret Kulesi'ni (Psychic Beacon) yok et.
INI:Missions:RA2_ALL04:Description=Müttefik Görevi 4 - Son Şans
INI:Missions:RA2_ALL04:LongDescription=Müttefik Görevi 4 - Son Şans@Konum: Chicago@@Sovyet güçleri Amerika genelinde yakıp yıkmaya devam ediyor. Ajanlarımız Chicago'da büyük bir Psişik Amplifikatör keşfetti. Eğer etkinleştirilirse, bu cihaz Sovyetlerin tüm Kuzey Amerika'yı zihin kontrolü altına almasına izin verecek.@@ Hedef 1: Kıyıya çıkarma yap ve bir üs kur.@ Hedef 2: Psişik Amplifikatör devreye girmeden önce onu yok et.
INI:Missions:RA2_ALL05:Description=Müttefik Görevi 5 - Karanlık Gece
INI:Missions:RA2_ALL05:LongDescription=Müttefik Görevi 5 - Karanlık Gece@Konum: Polonya/Almanya Sınırı@@Avrupalı güçler, bir Sovyet nükleer karşı saldırısından korktukları için bizimle savaşmayı hala reddediyorlar. Polonya'daki orta menzilli füzelerinin yerini keşfettik. Özel ajan Tanya gizlice Polonya sınırını geçti. Sovyet Nükleer Füzelerini yok etmesi için onu yönlendireceksiniz.@@ Hedef 1: Sovyet Savaş Laboratuvarı'na sız.@ Hedef 2: 2 adet Sovyet Nükleer Füze Silosunu etkisiz hale getir.@ Hedef 3: Tanya'yı hayatta tut.
INI:Missions:RA2_ALL06:Description=Müttefik Görevi 6 - Özgürlük
INI:Missions:RA2_ALL06:LongDescription=Müttefik Görevi 6 - Özgürlük@Konum: Washington DC@@Avrupalılar bize katıldı ve karşı saldırı zamanı geldi. Washington DC'yi geri alacağız ve ardından ulusumuzun geri kalanını Sovyet pisliklerinden temizleyeceğiz.@@ Hedef 1: Pentagon'daki Müttefik kuvvetlerini takviye et ve komutasını al.@ Hedef 2: Washington'daki tüm Sovyet güçlerini yok et.
INI:Missions:RA2_ALL07:Description=Müttefik Görevi 7 - Derin Deniz
INI:Missions:RA2_ALL07:LongDescription=Müttefik Görevi 7 - Derin Deniz@Konum: Pearl Harbor, Hawaii@@Sovyetler hala dünyanın çoğunu kaplıyor. Onlarla nerede olurlarsa olsunlar savaşmaya devam etmeliyiz. Hawaii'ye doğru yola çıkan bir Sovyet filosu keşfedildi. Bu filoyu yok edin, Pasifik bizim olsun. @@ Hedef 1: Tüm Sovyet güçlerini yok et.
INI:Missions:RA2_ALL08:Description=Müttefik Görevi 8 - Özgür Geçit
INI:Missions:RA2_ALL08:LongDescription=Müttefik Görevi 8 - Özgür Geçit@Konum: Saint Louis, Missouri@@Biz Amerika'yı Sovyet güçlerinden temizlerken bile, onlar küçük oyuncaklarının bizi yok edeceği umuduyla psişik teknolojileriyle oynamaya devam ediyorlar. St. Louis'de bir Psişik İşaret Kulesi keşfettik. Özel ajan Tanya'yı içeri sok ve kuleyi yok et.@@ Hedef 1: Sovyet Psişik İşaret Kulesi'ni yok et.@ Hedef 2: St. Louis içindeki tüm Sovyet güçlerini yok et.@ Hedef 3: Tanya'nın ölmesine izin verme.
INI:Missions:RA2_ALL09:Description=Müttefik Görevi 9 - Güneş Tapınağı
INI:Missions:RA2_ALL09:LongDescription=Müttefik Görevi 9 - Güneş Tapınağı@Konum: Tulum, Meksika@@Sovyetler batı yakası üslerimizden birini ve onunla birlikte bir Prizma Kulesi'ni ele geçirdi. Bu teknolojiyi Yucatan'daki gizli bir Sovyet araştırma tesisinde kopyalamaya çalışıyor olabileceklerine inanıyoruz. Bir SEAL saldırı timi hazırda bekliyor Komutan, emirlerinizi bekliyorlar.@@ Hedef 1: Sovyetlerin Prizma Teknolojimizi kopyalama girişimlerini ele geçir veya yok et.@ Hedef 2: Araştırma alanlarını savunan Sovyet üssünü ortadan kaldır.
INI:Missions:RA2_ALL10:Description=Müttefik Görevi 10 - Serap
INI:Missions:RA2_ALL10:LongDescription=Müttefik Görevi 10 - Serap@Konum: Kara Orman, Almanya@@Başarıya hasret kalan Sovyet güçleri, Almanya'daki Avrupalı müttefiklerimize karşı saldırıya geçerek Kara Orman'ın derinliklerine ilerledi. Şüphesiz komutanları, Einstein'ın laboratuvarını bulup ele geçirmeyi umuyorlar. Özel yeteneklerinize ihtiyaç duyuldu. Almanlar, stratejik becerileriniz olmadan yenileceklerinden korkuyorlar.@@ Hedef 1: Profesör Einstein'ın laboratuvarının güvenliğini sağla.@ Hedef 2: Tüm Sovyet güçlerini yok et.
INI:Missions:RA2_ALL11:Description=Müttefik Görevi 11 - Serpinti
INI:Missions:RA2_ALL11:LongDescription=Müttefik Görevi 11 - Serpinti@Konum: Florida Keys@@Einstein, Kronosfer'i için mükemmel yeri buldu. Ne yazık ki bu konum Sovyet kontrolündeki Küba'ya çok yakın. Kronosfer'i inşa et ve bölgeyi Sovyet nükleer füzelerinden temizle. Moskova'ya yapacağımız son saldırı için neredeyse hazırız.@@ Hedef 1: Bir Kronosfer inşa et.@ Hedef 2: Küba'daki Sovyet Nükleer tehdidini etkisiz hale getir.
INI:Missions:RA2_ALL12:Description=Müttefik Görevi 12 - Krono Fırtınası
INI:Missions:RA2_ALL12:LongDescription=Müttefik Görevi 12 - Krono Fırtınası@Konum: Moskova@@Savaş neredeyse sona erdi. Özenle seçilmiş bir grup gönüllü, dünyanın diğer ucundan Moskova'yı işgal etmek için Kronosfer'i kullanacak. Kremlin'i güvence altına aldığınızda, Tanya Romanov'u yakalayacak ve Sovyet saldırganlığına son verecek. Bunu başarabilecek kadar yetenekli tek komutan sensin. Kuvvetlerin sayıca en az on kat az olacak. İyi şanslar.@@ Hedef 1: Krono Takviyelerinin gelebilmesi için alanı temizle.@ Hedef 2: Kremlin çevresindeki Romanov'un Elit Kara Muhafızlarını ortadan kaldır.
